[package]
name = "murphy-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "murphy"
path = "src/main.rs"

[dependencies]
murphy-core = { path = "../murphy-core" }
murphy-plugin-api = { path = "../murphy-plugin-api" }
murphy-reporting = { path = "../murphy-reporting" }
# Standard cop pack (Murphy/Lint/Style/Layout, ADR 0018) — statically
# linked into the CLI and registered through the same single-surface
# plugin ABI as `.so` packs (murphy-9cr.23 §12b). The CLI owns the wiring
# because murphy-core treats *all* cops uniformly as `PluginCopV1`s and
# never hardcodes a particular pack.
murphy-std = { path = "../murphy-std" }
rayon = "1"
serde_json = "1"

[dev-dependencies]
assert_cmd = "2"
tempfile = "3"

[features]
default = []
# Mirror of `murphy-core`'s feature gate so the CLI's gated integration
# test (`mruby_e2e`) compiles under `--features mruby-user-cops`. With
# the feature off, the legacy mruby user-cop path stays compiled out.
mruby-user-cops = ["murphy-core/mruby-user-cops"]
