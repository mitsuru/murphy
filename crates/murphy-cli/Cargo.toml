[package]
name = "murphy-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "murphy"
path = "src/main.rs"

[dependencies]
murphy-core = { path = "../murphy-core" }
murphy-reporting = { path = "../murphy-reporting" }
rayon = "1"
serde_json = "1"

[dev-dependencies]
assert_cmd = "2"
tempfile = "3"
