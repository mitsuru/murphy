# Local-only mise overrides — NOT committed (see .gitignore).
# Holds secrets / machine-specific env. mise merges this on top of mise.toml.
#
# pr-agent (uvx) + OpenCode Zen (OpenAI-compatible gateway).
# Zen endpoint is OpenAI-compatible, so route LiteLLM via the `openai/` prefix
# and point API_BASE at Zen. Run with:
#   uvx --from pr-agent pr-agent --pr_url=<URL> review
[env]
# OpenCode Zen API key (paste your real key here — keep this file out of git).
OPENAI__KEY = "sk-YqLFvNMvDDg3C28REuBmwsoiyN4ih9NBrj0gjs7puL90eCRzmk2gpU29Ap7Kvfui"
# Zen "go" OpenAI-compatible base URL.
OPENAI__API_BASE = "https://opencode.ai/zen/go/v1"
# Model must use the `openai/` prefix so LiteLLM treats Zen as OpenAI-compatible.
# Available ids (from /zen/go/v1/models): minimax-m3, minimax-m2.7, minimax-m2.5,
# kimi-k2.6, kimi-k2.5, glm-5.1, glm-5, deepseek-v4-pro, deepseek-v4-flash,
# qwen3.7-max, qwen3.7-plus, qwen3.6-plus, qwen3.5-plus, mimo-v2-pro,
# mimo-v2-omni, mimo-v2.5-pro, mimo-v2.5, hy3-preview
CONFIG__MODEL = "openai/deepseek-v4-pro"
# Override pr-agent's default fallback (it points at OpenAI proper otherwise).
CONFIG__FALLBACK_MODELS = "[\"openai/glm-5.1\"]"

# If you also use a GitHub-hosted PR target, add a token:
# GITHUB__USER_TOKEN = "ghp_REPLACE_ME"
