name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@v2

      - name: Install rustfmt + clippy components
        run: rustup component add rustfmt clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: >
          cargo fmt
          -p murphy-ast
          -p murphy-cache
          -p murphy-cli
          -p murphy-core
          -p murphy-example-pack
          -p murphy-pattern
          -p murphy-plugin-api
          -p murphy-plugin-macros
          -p murphy-rails
          -p murphy-reporting
          -p murphy-rspec
          -p murphy-std
          -p murphy-translate
          -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --no-fail-fast

  markdownlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v20
